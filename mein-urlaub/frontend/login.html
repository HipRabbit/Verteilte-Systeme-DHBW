<!DOCTYPE html>
<html lang="de" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Urlaub - Anmelden</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="shared.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gradient-hero);
            background-attachment: fixed;
            padding: 20px;
        }
        .login-container { max-width: 480px; width: 100%; }
        .login-card {
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .login-icon { font-size: 4rem; color: var(--urlaub-primary); }
        .demo-card {
            background: var(--urlaub-sand);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            border: 1px dashed var(--urlaub-primary);
        }
        [data-bs-theme="dark"] .demo-card {
            background: #2a3b47;
            border-color: var(--urlaub-primary-light);
        }
        .demo-user-row {
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: background 0.15s;
        }
        .demo-user-row:hover { background: rgba(0, 180, 166, 0.15); }
        .gast-divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #888;
        }
        .gast-divider::before, .gast-divider::after {
            content: "";
            flex: 1;
            border-bottom: 1px solid #ccc;
            margin: 0 12px;
        }
        .admin-link {
            position: fixed;
            top: 20px;
            right: 20px;
            color: white;
            opacity: 0.7;
            text-decoration: none;
        }
        .admin-link:hover { opacity: 1; color: white; }
    </style>
</head>
<body>

<a href="admin/index.html" class="admin-link">
    <i class="bi bi-shield-lock"></i> Admin-Bereich
</a>

<div class="login-container">
    <div class="card login-card">
        <div class="text-center mb-4">
            <div class="login-icon"><i class="bi bi-suitcase-lg"></i></div>
            <h1 class="mt-2 mb-0">Mein Urlaub</h1>
            <p class="text-muted">Wie möchtest du fortfahren?</p>
        </div>

        <form id="login-form" onsubmit="anmelden(event)">
            <div class="mb-3">
                <label class="form-label">Benutzername</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="username" required autocomplete="username">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Passwort</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" required autocomplete="current-password">
                </div>
            </div>
            <div id="login-fehler" class="alert alert-danger d-none"></div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> Anmelden
            </button>
        </form>

        <div class="gast-divider">oder</div>

        <button class="btn btn-outline-primary w-100" onclick="alsGastFortfahren()">
            <i class="bi bi-person-walking"></i> Als Gast fortfahren
        </button>
        <p class="text-center text-muted small mt-2 mb-0">
            Als Gast kannst du alle Angebote ansehen, aber keine Bewertungen schreiben.
        </p>

        <div class="demo-card mt-4">
            <small class="text-muted d-block mb-2">
                <i class="bi bi-info-circle"></i> <strong>Demo-Konten</strong> (Klick zum Übernehmen):
            </small>
            <div id="demo-users"></div>
        </div>
    </div>

    <p class="text-center text-white mt-3 small opacity-75">
        DHBW Heilbronn · Verteilte Systeme · Gruppenarbeit
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>
<script>
    if (AUTH.istEingeloggt()) {
        window.location.href = 'user/index.html';
    }

    function anmelden(event) {
        event.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const fehler = document.getElementById('login-fehler');

        const session = AUTH.login(username, password);
        if (!session) {
            fehler.textContent = 'Benutzername oder Passwort ungültig.';
            fehler.classList.remove('d-none');
            return;
        }
        window.location.href = 'user/index.html';
    }

    function alsGastFortfahren() {
        AUTH.logout();
        window.location.href = 'user/index.html';
    }

    const demoPwds = { maria: 'maria123', thomas: 'thomas123' };
    const demoEl = document.getElementById('demo-users');
    demoEl.innerHTML = AUTH.getDemoUsers().map(u => `
        <div class="demo-user-row d-flex justify-content-between align-items-center"
             onclick="document.getElementById('username').value='${u.username}'; document.getElementById('password').value='${demoPwds[u.username]}';">
            <span>
                <strong>${u.username}</strong>
                <small class="text-muted ms-1">/ ${demoPwds[u.username]}</small>
            </span>
            <span class="badge bg-primary">User</span>
        </div>
    `).join('');
</script>

</body>
</html>
