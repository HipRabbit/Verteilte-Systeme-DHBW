version: '3.8'

# Verteiltes System "Mein Urlaub" - alle Services + MongoDB in Containern
# Starten mit: docker compose up --build
# Stoppen mit:  docker compose down
# Daten löschen: docker compose down -v

services:

  mongodb:
    image: mongo:7
    container_name: mein-urlaub-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  bewertungs-server:
    build: ./backend/bewertungs-server
    container_name: mein-urlaub-bewertungen
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/bewertungen
    depends_on:
      - mongodb
    restart: unless-stopped

  hotel-server:
    build: ./backend/hotel-server
    container_name: mein-urlaub-hotels
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/hotels
    depends_on:
      - mongodb
    restart: unless-stopped

  flugverbindung-server:
    build: ./backend/flugverbindung-server
    container_name: mein-urlaub-fluege
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGODB_URI=mongodb://mongodb:27017/flugverbindungen
    depends_on:
      - mongodb
    restart: unless-stopped

  mietwagen-server:
    build: ./backend/mietwagen-server
    container_name: mein-urlaub-mietwagen
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - MONGODB_URI=mongodb://mongodb:27017/mietwagen
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongo-data:
